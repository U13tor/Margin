name: release

# M6-C5: Windows release packaging pipeline.
# Triggers:
#   - push v* tag → production release (auto-creates GitHub Release with installer)
#   - workflow_dispatch → dry-run on any branch (uploads artifact, no Release)
#
# macOS packaging is out of scope for v1.0 (user-scoped release to Windows-only).
# Code signing is deferred to v1.1+ (docs/12-deferred-items.md C2/A5); the
# installer is unsigned, which means Windows SmartScreen will warn on first
# install — release notes document the workaround.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Dry-run version label (e.g. 0.1.0-rc1). Used only for artifact naming; does NOT create a GitHub Release.'
        required: false
        default: 'dry-run'

permissions:
  contents: write  # required by softprops/action-gh-release to create the Release

jobs:
  build-windows-installer:
    name: Build Windows installer
    # Pinned to windows-2022: Qt 6.5.3 requires MSVC ≤14.39 (stdext removal in 14.40+)
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # fetch-depth 0 so version metadata + tag history is complete.
          fetch-depth: 0

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ runner.workspace }}/vcpkg

      - name: Setup Qt 6.5
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5'

      - name: Setup MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          toolset: '14.39'

      - name: Configure (Release)
        shell: bash
        run: cmake --preset win64-msvc-release

      - name: Build
        shell: bash
        run: cmake --build --preset win64-msvc-release

      - name: Static audit (zero-network + no placeholder/XOR)
        shell: bash
        run: |
          if grep -rEIi "placeholder|XOR" src/; then
            echo "::error::placeholder or XOR found in src/ (see docs/13-lessons-learned.md)"
            exit 1
          fi
          if grep -rEn "QNetworkAccessManager|QNetworkRequest" src/; then
            echo "::error::Qt network classes found in src/ (violates §5.1 zero-network)"
            exit 1
          fi

      - name: Test (unit + integration + smoke)
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          ctest --test-dir build/win64-msvc-release -L unit --output-on-failure
          ctest --test-dir build/win64-msvc-release -L integration --output-on-failure
          ctest --test-dir build/win64-msvc-release -L smoke --output-on-failure --no-tests=ignore

      - name: Stage install (windeployqt + licenses)
        shell: bash
        # cmake --install runs the install(CODE) windeployqt step from
        # CMakeLists.txt, placing Qt DLLs / platforms/ / tls/ etc. into
        # the staging prefix alongside Margin.exe. Staging to
        # build/win64-msvc-release/stage because the install.nsi baked at
        # configure time references that exact path (see packaging/install.nsi.in).
        run: cmake --install build/win64-msvc-release --prefix build/win64-msvc-release/stage

      - name: Stage snapshot listing
        shell: bash
        # Sanity check: confirm windeployqt populated the stage dir with
        # the Qt runtime we expect. Fails the job loudly if absent.
        run: |
          ls build/win64-msvc-release/stage/
          test -f build/win64-msvc-release/stage/Margin.exe
          test -f build/win64-msvc-release/stage/platforms/qwindows.dll
          test -f build/win64-msvc-release/stage/Qt6Cored.dll || test -f build/win64-msvc-release/stage/Qt6Core.dll
          test -f build/win64-msvc-release/stage/libcrypto-3-x64.dll
          test -f build/win64-msvc-release/stage/licenses/LICENSE
          test -f build/win64-msvc-release/stage/licenses/LICENSE-Apache-2.0.txt
          test -f build/win64-msvc-release/stage/plugins/margin-aura-locker.dll

      - name: Package (NSIS installer)
        shell: bash
        # Drive makensis directly against install.nsi (generated by
        # configure_file at CMake configure time). Bypassing CPack NSIS
        # because CMake 4.0 doesn't honor CPACK_NSIS_TEMPLATE_FILE, so the
        # stock template's RequestExecutionLevel admin + SetShellVarContext
        # all dance can't be overridden. See docs/posts/2026-06-24-nsis-installer-handoff.md.
        run: |
          makensis build/win64-msvc-release/install.nsi
          test -f build/win64-msvc-release/Margin-Setup-${GITHUB_REF_NAME:-${{ inputs.version }}}-x64.exe || \
            test -f build/win64-msvc-release/Margin-Setup-0.1.0-x64.exe

      - name: Package (Portable ZIP)
        shell: bash
        # Create a portable / "green" ZIP from the staged directory.
        # No installation required — users can extract and run Margin.exe directly.
        run: |
          VERSION="${GITHUB_REF_NAME:-${{ inputs.version }}}"
          # Fall back to 0.1.0 for non-tag builds without explicit version input
          VERSION="${VERSION:-0.1.0}"
          cd build/win64-msvc-release/stage
          7z a -tzip "../Margin-Portable-${VERSION}-x64.zip" .
          cd ..
          test -f "Margin-Portable-${VERSION}-x64.zip"

      - name: Resolve artifact name
        id: name
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "label=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "label=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Margin-Setup-${{ steps.name.outputs.label }}
          path: build/win64-msvc-release/Margin-Setup-*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload portable ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: Margin-Portable-${{ steps.name.outputs.label }}
          path: build/win64-msvc-release/Margin-Portable-*.zip
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/win64-msvc-release/Margin-Setup-*.exe
            build/win64-msvc-release/Margin-Portable-*.zip
          generate_release_notes: true
          body: |
            ## 下载说明

            | 包 | 文件 | 说明 |
            |---|------|------|
            | 安装版 | `Margin-Setup-${{ github.ref_name }}-x64.exe` | NSIS 安装器,自动创建开始菜单快捷方式和卸载入口 |
            | 绿色版 | `Margin-Portable-${{ github.ref_name }}-x64.zip` | 解压即用,无需安装,不写注册表 |

            ## SmartScreen 提示

            v1.0 安装包**未做代码签名**(代码签名推迟到 v1.1+,见
            [docs/12-deferred-items.md C2/A5](https://github.com/U13tor/Margin/blob/main/docs/12-deferred-items.md))。

            首次运行 `Margin-Setup-${{ github.ref_name }}-x64.exe` 时,Windows
            SmartScreen 会显示 "Windows 已保护你的电脑":

            1. 点击 **"更多信息"**
            2. 点击 **"仍要运行"**
            3. 之后正常安装到 `%LOCALAPPDATA%\Margin\`(无需管理员权限)

            ## 校验

            安装完成后,`Margin.exe` → 右键属性 → 详细信息应显示:
            - **FileVersion**: ${{ github.ref_name }}
            - **ProductName**: Margin
            - **LegalCopyright**: Margin contributors — LGPL-3.0-or-later

            ## License

            Margin 自身:LGPL-3.0-or-later(见 `licenses/LICENSE`)
            捆绑依赖:Qt 6.5 (LGPL/商业双许可) / OpenSSL 3.x (Apache-2.0) /
            Inter + JetBrains Mono fonts (OFL-1.1)
